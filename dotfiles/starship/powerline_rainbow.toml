[os]
disabled = false
style = "bg:{{red}} fg:{{white}}"

[os.symbols]
NixOS = "¾▒äà"
Macos = "¾░ÇÁ"
Linux = "¾░î¢"

[username]
show_always = true
style_user = "bg:{{red}} fg:{{white}}"
