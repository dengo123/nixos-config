format = "[ $user ]($style)"

[directory]
style = "bg:{{orange}} fg:{{black}}"
format = "[ $path ]($style)"
truncation_length = 2
truncation_symbol = "ÔÇª/"

[directory.substitutions]
Documents = "¾░êÖ "
Downloads = "´ÇÖ "
Music = "´Çü "
Pictures = "´Ç¥ "
Developer = "¾░▓ï "

[git_branch]
symbol = "´Éÿ"
style = "bg:{{yellow}}"
